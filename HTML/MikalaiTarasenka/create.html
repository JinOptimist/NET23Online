<html>
<head>
    <title>Добавить животное — Мир животных</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-body">
        <h1>Удивительный мир животных</h1>
        <div class="header-links">
            <a class="header-link" href="/">Главная</a>
            <a class="header-link" href="">Интересные факты</a>
        </div>
    </div>

    <div class="main-place">
        <div class="green-title">
            <h2>Добавление нового обитателя</h2>
        </div>
        <hr class="green-line">
        
        <p>Заполните форму ниже, чтобы рассказать о новом животном на нашем сайте.</p>

        <form action="/AnimalWorld/Create" method="post">
            <div class="form-group">
                <label for="Name">Название животного</label>
                <input class="form-input" type="text" id="Name" name="Name" placeholder="Например: Снежный барс" required>
            </div>

            <div class="form-group">
                <label for="BriefDescription">Краткое описание (для списка)</label>
                <input class="form-input" type="text" id="BriefDescription" name="BriefDescription" placeholder="Опишите в одном предложении..." required>
            </div>

            <div class="form-group">
                <label for="FullDescription">Полная информация</label>
                <textarea class="form-textarea" id="FullDescription" name="FullDescription" placeholder="Расскажите подробнее о среде обитания, питании и особенностях..."></textarea>
            </div>

            <div class="button-group">
                <button class="find-animal-button" type="submit">Опубликовать</button>
                <a href="/" class="back-link">Отмена</a>
            </div>
        </form>
    </div>

    <div class="footer-body">
        <p>&copy; 2026 Мир Животных. Берегите природу!</p>
    </div>
</body>
</html>
