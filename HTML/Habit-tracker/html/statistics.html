<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Statistics</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' href='../css/main.css'>
    <link rel='stylesheet' type='text/css' href='../css/statistics.css'>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="logo"><h1>Habit-tracker</h1></div>
                <div class="tagline">Начни сегодня</div>
            </div>
            <img class="ava" src="../img/avatarka.jpg">
        </div>
    </header>

    <div class="main-content">
        <nav>
            <ul>
                <li><a href="../index.html">Трекер задач</a></li>
                <li><a href="statistics.html" class="active">Статистика</a></li>
                <li><a href="diary.html">Дневник</a></li>
                <li><a href="#">Добавить привычку</a></li>
                <li><a href="#">Настройки</a></li>
            </ul>
        </nav>

        <div class="tracker">
            <div class="tracker-title">Статистика за месяц</div>
            <div class="tracker-date" id="month-label"></div>

            <div class="table-tracker stats-container">
                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-name">Спорт 30 мин</span>
                        <span class="stat-value" id="val-sport">0 / 30</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill sport" id="bar-sport"></div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-name">Английский 20 мин</span>
                        <span class="stat-value" id="val-english">0 / 30</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill english" id="bar-english"></div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-name">Программирование 1 час</span>
                        <span class="stat-value" id="val-programming">0 / 30</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill programming" id="bar-programming"></div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-name">Вода 2л</span>
                        <span class="stat-value" id="val-water">0 / 30</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill water" id="bar-water"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src='../js/statistics.js'></script>
</body>
</html>
