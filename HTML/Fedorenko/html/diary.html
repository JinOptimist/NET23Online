<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Diary</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' href='../css/main.css'>
    <link rel='stylesheet' type='text/css' href='../css/diary.css'>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="logo"><h1>Habit-tracker</h1></div>
                <div class="tagline">Начни сегодня</div>
            </div>
            <img class="ava" src="../img/avatarka.jpg">
        </div>
    </header>

    <div class="main-content">
        <nav>
            <ul>
                <li><a href="../index.html">Трекер задач</a></li>
                <li><a href="statistics.html">Статистика</a></li>
                <li><a href="diary.html" class="active">Дневник</a></li>
                <li><a href="#">Добавить привычку</a></li>
                <li><a href="#">Настройки</a></li>
            </ul>
        </nav>

        <div class="tracker">
            <div class="tracker-title">Дневник</div>
            <div class="tracker-date">Нажми на день чтобы добавить запись</div>

            <div class="diary-wrapper">
                <div class="calendar-header">
                    <button class="calendar-nav" id="prev">←</button>
                    <span id="month-title"></span>
                    <button class="calendar-nav" id="next">→</button>
                </div>
                <div class="calendar-grid" id="calendar"></div>
            </div>
        </div>
    </div>

    <div class="popup-overlay" id="popup-overlay">
        <div class="popup">
            <div class="popup-date" id="popup-date"></div>
            <textarea id="popup-text" placeholder="Напиши что-нибудь..."></textarea>
            <div class="popup-buttons">
                <button class="btn-cancel" id="btn-cancel">Отмена</button>
                <button class="btn-save" id="btn-save">Сохранить</button>
            </div>
        </div>
    </div>

    <script src='../js/diary.js'></script>
</body>
</html>
