<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Habit-tracker</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='css/main.css'>
</head>
<body>
    <header>
    <div class="header-content">
        <div class="header-left">
        <div class="logo"><h1>Habit-tracker</h1></div>
        <div class="tagline">Начни сегодня</div>
        </div>
        <img class="ava" src="img/avatarka.jpg">
    </div>
    </header>

    <div class="main-content">

        <nav>
            <ul>
                <li><a href="index.html" class="active">Трекер задач</a></li>
                <li><a href="html/statistics.html">Статистика</a></li>
                <li><a href="html/diary.html">Дневник</a></li>
                <li><a href="index.html">Добавить привычку</a></li>
                <li><a href="index.html">Настройки</a></li>
            </ul>
        </nav>

        <div class="tracker">
            <div class="tracker-title">Трекер задач на неделю</div>
            <div class="tracker-date">Сегодня - </div>

            <div class="table-tracker">
                <table>
                    <thead>
                    <tr>
                        <th></th>
                        <th>Пн</th>
                        <th>Вт</th>
                        <th>Ср</th>
                        <th>Чт</th>
                        <th>Пт</th>
                        <th>Сб</th>
                        <th>Вс</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td class="habit-name">Спорт 30 мин</td>
                        <td><span class="dot sport"></span></td>
                        <td><span class="dot sport"></span></td>
                        <td><span class="dot sport"></span></td>
                        <td><span class="dot sport"></span></td>
                        <td><span class="dot sport"></span></td>
                        <td><span class="dot sport"></span></td>
                        <td><span class="dot sport"></span></td>
                    </tr>
                    <tr>
                        <td class="habit-name">Английский 20 мин</td>
                        <td><span class="dot english"></span></td>
                        <td><span class="dot english"></span></td>
                        <td><span class="dot english"></span></td>
                        <td><span class="dot english"></span></td>
                        <td><span class="dot english"></span></td>
                        <td><span class="dot english"></span></td>
                        <td><span class="dot english"></span></td> 
                    </tr>
                    <tr>
                        <td class="habit-name">Программирование 1 час</td>
                        <td><span class="dot programming"></span></td>
                        <td><span class="dot programming"></span></td>
                        <td><span class="dot programming"></span></td>
                        <td><span class="dot programming"></span></td>
                        <td><span class="dot programming"></span></td>
                        <td><span class="dot programming"></span></td>
                        <td><span class="dot programming"></span></td>
                    </tr>
                    <tr>
                        <td class="habit-name">Вода 2л</td>
                        <td><span class="dot water
                            "></span></td>
                        <td><span class="dot water"></span></td>
                        <td><span class="dot water"></span></td>
                        <td><span class="dot water"></span></td>
                        <td><span class="dot water"></span></td>
                        <td><span class="dot water"></span></td>
                        <td><span class="dot water"></span></td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

<script src='js/main.js'></script>
</body>
</html>
